# Bitcoin Knots v29.3.knots20260508 — regtest (Forkwars e2e).
# Knots is the RDTS-ENFORCING side. `consensusrules=rdts` opts this node into the
# BIP-110/RDTS ruleset non-interactively (headless equivalent of the GUI confirm prompt).
regtest=1
server=1
daemon=0
printtoconsole=1
txindex=1

# Enable RDTS enforcement on this node.
consensusrules=rdts

[regtest]
rpcuser=forkwars
rpcpassword=forkwars_regtest
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcport=18443
port=18444
bind=0.0.0.0
listen=1
zmqpubhashblock=tcp://0.0.0.0:28332
fallbackfee=0.0002

# Activate the RDTS ("reduced_data", bit 4) deployment on regtest: start now, no timeout.
# Default regtest chainparams set it NEVER_ACTIVE, so we override to drive it to ACTIVE via
# signaling. (regtest-only; Core has no such deployment.)
vbparams=reduced_data:0:9223372036854775807

# Peer directly to Core so this node sees Core's blocks and can mark violating ones invalid.
addnode=core:18444
