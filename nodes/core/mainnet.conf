# Bitcoin Core v31.1 — MAINNET (Forkwars). Pruned, blocks-only. Tor for P2P ONLY.
# Core is the non-enforcing side (no RDTS).
server=1
daemon=0
printtoconsole=1
prune=150000
blocksonly=1
txindex=0

# The UTXO cache is the dominant driver of this node's RSS, so it is the knob that has to agree with
# the container's mem_limit (see compose/docker-compose.prod.yml). 450 MiB is Core's own default,
# stated explicitly here so the memory budget is visible rather than implied: pair it with a ~5g
# limit on a 16 GB box; use 300 on an 8 GB box, or 1000 on 32 GB for a faster IBD.
dbcache=450

# RPC credentials. The entrypoint writes /data/rpc.conf (mode 0600) at startup holding an rpcauth
# SALTED HASH derived from RPC_USER/RPC_PASS, so no secret is committed here and no password ever
# reaches a command line (host `ps aux` would show it). Must stay at global scope: bitcoind rejects
# includeconf inside a network section. The file always exists — the entrypoint creates it, empty
# when no credentials are supplied, in which case bitcoind uses cookie auth alone.
includeconf=rpc.conf

# --- Public P2P over Tor only; direct clearnet ONLY for the internal Core<->Knots peer link. ---
# Use onion= (not proxy=) so Tor proxies onion addrs but ipv4 stays direct — that lets the addnode
# below reach the peer container over fwnet. onlynet=onion still bars every *automatic* clearnet
# dial (no public leak); manual addnode connections are exempt from onlynet by design. listen=1
# accepts the peer's inbound on fwnet (8333 is not published to the host); listenonion=0 avoids
# spinning up an inbound hidden service (we have no Tor control port).
onion=tor:9050
onlynet=onion
listen=1
listenonion=0
dnsseed=0

[main]
# RPC auth comes from the rpcauth hash in the includeconf'd rpc.conf above, never from this file.
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcport=8332
zmqpubhashblock=tcp://0.0.0.0:28332
# Direct local peer link to Knots so neither node can lag behind the other on Tor luck (a lagging
# node would render as a false fork). Manual peer → exempt from onlynet, connects direct over fwnet.
addnode=knots:8333
