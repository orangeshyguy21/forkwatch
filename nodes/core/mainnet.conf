# Bitcoin Core v31.1 — MAINNET (Forkwars). Pruned, blocks-only. Tor for P2P ONLY.
# Core is the non-enforcing side (no RDTS).
server=1
daemon=0
printtoconsole=1
prune=150000
blocksonly=1
txindex=0

# --- Public P2P over Tor only; direct clearnet ONLY for the internal Core<->Knots peer link. ---
# Use onion= (not proxy=) so Tor proxies onion addrs but ipv4 stays direct — that lets the addnode
# below reach the peer container over fwnet. onlynet=onion still bars every *automatic* clearnet
# dial (no public leak); manual addnode connections are exempt from onlynet by design. listen=1
# accepts the peer's inbound on fwnet (8333 is not published to the host); listenonion=0 avoids
# spinning up an inbound hidden service (we have no Tor control port).
onion=tor:9050
onlynet=onion
listen=1
listenonion=0
dnsseed=0

[main]
rpcuser=forkwars
rpcpassword=forkwars_mainnet
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcport=8332
zmqpubhashblock=tcp://0.0.0.0:28332
# Direct local peer link to Knots so neither node can lag behind the other on Tor luck (a lagging
# node would render as a false fork). Manual peer → exempt from onlynet, connects direct over fwnet.
addnode=knots:8333
