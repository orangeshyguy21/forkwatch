# Bitcoin Core v31.1 — regtest (Forkwars e2e).
# Core is the NON-enforcing side: it has no RDTS logic and accepts violating blocks.
regtest=1
server=1
daemon=0
printtoconsole=1
txindex=1

# RPC credentials: entrypoint writes /data/rpc.conf (0600) with an rpcauth salted hash derived from
# RPC_USER/RPC_PASS, so no password reaches a command line. Global scope is required — bitcoind
# rejects includeconf inside a network section.
includeconf=rpc.conf

[regtest]
# RPC auth comes from the rpcauth hash in the includeconf'd rpc.conf above, never from this file.
rpcbind=0.0.0.0
rpcallowip=0.0.0.0/0
rpcport=18443
port=18444
bind=0.0.0.0
listen=1
zmqpubhashblock=tcp://0.0.0.0:28332
fallbackfee=0.0002

# Permissive policy so Core will accept + mine RDTS-violating txs (large OP_RETURN,
# non-standard scriptPubKeys) that the e2e driver crafts. These are POLICY knobs only;
# Core has no RDTS *consensus* rule, so it includes such txs in blocks regardless.
acceptnonstdtxn=1
datacarriersize=100000

# Peer directly to the Knots node so it receives (and rejects) Core's blocks.
addnode=knots:18444
