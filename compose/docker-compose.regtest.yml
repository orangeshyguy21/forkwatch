# Forkwatch — regtest / e2e stack.
# Tunables come from compose/regtest.env (+ compose/.regtest.runtime.env for reset-derived values).
# Drive this file through scripts/regtest.sh, which passes both --env-file s; the defaults below
# only apply to a bare `docker compose -f` invocation.
# Two peered nodes on regtest (no Tor, no pruning, no snapshot). Core accepts everything;
# Knots enforces RDTS. The e2e driver forces the fork on demand. Dev-only (not exposed on the LAN).
name: forkwatch-regtest

services:
  core:
    build:
      context: ../nodes/core
    container_name: fw-core
    restart: unless-stopped
    environment:
      # RPC auth: injected into bitcoind by the node entrypoint (no credential baked into the conf).
      - RPC_USER=${FW_RPC_USER:-forkwars}
      - RPC_PASS=${FW_RPC_PASS:-forkwars_regtest}
    volumes:
      - core-data:/data
      - ../nodes/core/regtest.conf:/data/bitcoin.conf:ro
    networks: [fwnet]
    ports:
      - "18443:18443"   # Core RPC exposed to host for debugging/e2e driver
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data -rpcuser=\"$$RPC_USER\" -rpcpassword=\"$$RPC_PASS\" -rpcwait getblockchaininfo"]
      interval: 5s
      timeout: 10s
      retries: 20

  knots:
    build:
      context: ../nodes/knots
    container_name: fw-knots
    restart: unless-stopped
    environment:
      - RPC_USER=${FW_RPC_USER:-forkwars}
      - RPC_PASS=${FW_RPC_PASS:-forkwars_regtest}
    volumes:
      - knots-data:/data
      - ../nodes/knots/regtest.conf:/data/bitcoin.conf:ro
    networks: [fwnet]
    ports:
      - "18453:18443"   # Knots RPC exposed to host (remapped to avoid clashing with Core)
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data -rpcuser=\"$$RPC_USER\" -rpcpassword=\"$$RPC_PASS\" -rpcwait getblockchaininfo"]
      interval: 5s
      timeout: 10s
      retries: 20

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: fw-app
    restart: unless-stopped
    depends_on: [core, knots]
    environment:
      - CORE_RPC_URL=http://core:18443
      - KNOTS_RPC_URL=http://knots:18443
      - RPC_USER=${FW_RPC_USER:-forkwars}
      - RPC_PASS=${FW_RPC_PASS:-forkwars_regtest}
      - POLL_MS=${POLL_MS:-2000}
      - BIND=0.0.0.0:8080
      - NETWORK=regtest
      # Derived at reset time into compose/.regtest.runtime.env — see scripts/regtest.sh. RDTS
      # activation lands on an unpredictable height, so these cannot be fixed constants.
      - FORK_AT_HEIGHT=${FORK_AT_HEIGHT:-6048}
      # Mirror of the mainnet deployment's shape, derived by the reset: floor and fork both land on
      # retarget boundaries, VISIBLE_EPOCHS apart, so epoch/ETA code paths behave as on mainnet.
      - FLOOR_HEIGHT=${FLOOR_HEIGHT:-0}
      - RETARGET_INTERVAL=${RETARGET_INTERVAL:-2016}
      # Set here (unlike a plain regtest, where retargeting does not bind) because the reset dates
      # every block exactly BLOCK_SPACING_SECS apart — so this is the true spacing, not a fiction.
      - TARGET_SPACING_SECS=${BLOCK_SPACING_SECS:-20}
      - FORK_LABEL=${FORK_LABEL:-Scheduled fork}
      - DB_PATH=/data/forkwars.db
    # Image runs as uid 10001. One-time chown for the pre-existing root-owned volume:
    #   docker run --rm -v forkwars-regtest_app-db:/data alpine chown -R 10001:10001 /data
    # (or just `down -v`, since regtest history is reproducible).
    volumes:
      - app-db:/data
    ports:
      - "8080:8080"   # open http://localhost:8080 to view the app
    networks: [fwnet]

  # Continuous block producer: grows a shared chain, forks at FORK_AT_HEIGHT, then keeps both
  # chains advancing. This is what makes the demo "live" (before -> fork -> after).
  miner:
    build:
      context: ../miner
    container_name: fw-miner
    restart: unless-stopped
    depends_on: [core, knots]
    environment:
      - CORE_RPC_URL=http://core:18443
      - KNOTS_RPC_URL=http://knots:18443
      - RPC_USER=${FW_RPC_USER:-forkwars}
      - RPC_PASS=${FW_RPC_PASS:-forkwars_regtest}
      - MINE_INTERVAL_SECS=${BLOCK_SPACING_SECS:-20}   # live cadence == the spacing the history was dated at
      - FORK_AT_HEIGHT=${FORK_AT_HEIGHT:-6048}   # preprogrammed fork height (must match the app service)
      - PRE_FORK_BLOCKS=${PRE_FORK_BLOCKS:-18}     # fallback pre-fork window if setup already passed FORK_AT_HEIGHT
      - KNOTS_PER_100=${KNOTS_PER_100:-1}        # PRE-fork: Knots blocks per 100 on the shared chain
      - KNOTS_INTERVAL_SECS=${KNOTS_INTERVAL_SECS:-60}   # POST-fork: Knots' own cadence on its branch
      - VIOLATION_BYTES=${VIOLATION_BYTES:-200}   # OP_RETURN payload size in the fork-triggering tx
    networks: [fwnet]

networks:
  fwnet:

# Pinned to the original volume names so the existing regtest chain + app DB are reused as-is.
volumes:
  core-data:
    name: forkwars-regtest_core-data
  knots-data:
    name: forkwars-regtest_knots-data
  app-db:
    name: forkwars-regtest_app-db
