# Forkwatch — cloudflared config (OPTIONAL, locally-managed tunnel).
#
# The prod stack (docker-compose.prod.yml) defaults to a TOKEN-managed tunnel: you create the
# tunnel in the Cloudflare Zero Trust dashboard, set FW_CF_TUNNEL_TOKEN in compose/.env, and the
# routing (which hostname -> which service) lives in the dashboard. Nothing else is needed and this
# file is unused.
#
# Prefer to keep ingress rules in the repo instead? Use a locally-managed tunnel:
#
#   1. Install cloudflared locally and authenticate:
#          cloudflared tunnel login
#   2. Create a named tunnel (writes ~/.cloudflared/<UUID>.json credentials):
#          cloudflared tunnel create forkwatch
#   3. Route your DNS name to the tunnel (creates the proxied CNAME in Cloudflare):
#          cloudflared tunnel route dns forkwatch forkwatch.example.com
#   4. Copy this file to compose/cloudflared/config.yml and the credentials file into
#      compose/cloudflared/<UUID>.json, then fill in the two placeholders below.
#   5. In docker-compose.prod.yml, replace the cloudflared service's token-based config with:
#          command: ["tunnel", "--no-autoupdate", "--config", "/etc/cloudflared/config.yml", "run"]
#          volumes:
#            - ./cloudflared:/etc/cloudflared:ro
#      and drop the TUNNEL_TOKEN environment entry.
#
# compose/cloudflared/config.yml and *.json are gitignored — only this .example is committed.

tunnel: <TUNNEL_UUID>
credentials-file: /etc/cloudflared/<TUNNEL_UUID>.json

# A single hostname mapped to the app. cloudflared upgrades the /ws WebSocket transparently, so no
# separate rule is required. The final catch-all 404 is mandatory.
ingress:
  - hostname: forkwatch.example.com
    service: http://app:8080
  - service: http_status:404
