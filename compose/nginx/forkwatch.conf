# Forkwatch — LAN reverse proxy. Serves the mainnet app at http://forkwatch.local (port 80),
# proxying to the app container on the internal fwnet. WebSocket (/ws) is upgraded explicitly.
server {
    listen 80;
    listen [::]:80;
    server_name forkwatch.local;

    # Live chain updates ride a WebSocket at /ws — must pass the Upgrade/Connection headers.
    location /ws {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
