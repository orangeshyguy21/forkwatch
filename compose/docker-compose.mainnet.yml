# Forkwatch — MAINNET (production) stack.
# Two pruned, blocks-only nodes syncing the real chain over Tor (P2P only), bootstrapped from the
# assumeutxo snapshot at height 840,000. RPC/ZMQ/backend all stay on the internal network. An nginx
# reverse proxy exposes the app on the LAN at http://forkwatch.local; an mDNS publisher advertises
# that name. Data volumes are PINNED to their original forkwars-mainnet_* names so the node data and
# the cached-history DB survive the rename with zero copy / zero re-sync.
name: forkwatch-mainnet

# Log rotation and memory bounds — same reasoning as the prod stack: Docker's json-file driver is
# unbounded by default (a multi-day IBD will grow it without limit), and two nodes doing concurrent
# IBD can push the kernel into OOM-killing a bystander such as the app or nginx.
# SIZING: defaults below assume the ~32 GB host this stack runs on. Override in compose/.env.
x-logging: &logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

services:
  tor:
    build:
      context: ../tor
    container_name: fw-tor-main
    restart: unless-stopped
    mem_limit: ${FW_TOR_MEM_LIMIT:-256m}
    logging: *logging
    networks: [fwnet]

  core:
    build:
      context: ../nodes
      dockerfile: core/Dockerfile
    container_name: fw-core-main
    restart: unless-stopped
    mem_limit: ${FW_NODE_MEM_LIMIT:-8g}
    logging: *logging
    depends_on: [tor]
    environment:
      # RPC auth: the node entrypoint injects these into bitcoind so nothing is baked into the conf.
      - RPC_USER=${FW_RPC_USER:-forkwars}
      - RPC_PASS=${FW_RPC_PASS:?set FW_RPC_PASS in compose/.env (see compose/.env.example)}
      - LOAD_SNAPSHOT=${FW_LOAD_SNAPSHOT:-/snapshots/utxo-840000.dat}
      - SNAPSHOT_HEIGHT=${FW_SNAPSHOT_HEIGHT:-840000}
    volumes:
      - core-data:/data
      - ../nodes/core/mainnet.conf:/data/bitcoin.conf:ro
      - ../snapshots:/snapshots:ro
    healthcheck:
      # CMD-SHELL so the credentials expand from the container env ($$ escapes compose interpolation).
      # No credentials on the command line: bitcoind writes a .cookie (entrypoint configures rpcauth
      # instead of -rpcpassword), and bitcoin-cli reads it from the datadir. This healthcheck runs
      # every 15s, so passing the password here would keep it permanently visible in host `ps aux`.
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data -rpcwait getblockchaininfo"]
      interval: 15s
      timeout: 10s
      retries: 60
    networks: [fwnet]

  knots:
    build:
      context: ../nodes
      dockerfile: knots/Dockerfile
    container_name: fw-knots-main
    restart: unless-stopped
    mem_limit: ${FW_NODE_MEM_LIMIT:-8g}
    logging: *logging
    depends_on: [tor]
    environment:
      - RPC_USER=${FW_RPC_USER:-forkwars}
      - RPC_PASS=${FW_RPC_PASS:?set FW_RPC_PASS in compose/.env (see compose/.env.example)}
      - LOAD_SNAPSHOT=${FW_LOAD_SNAPSHOT:-/snapshots/utxo-840000.dat}
      - SNAPSHOT_HEIGHT=${FW_SNAPSHOT_HEIGHT:-840000}
    volumes:
      - knots-data:/data
      - ../nodes/knots/mainnet.conf:/data/bitcoin.conf:ro
      - ../snapshots:/snapshots:ro
    healthcheck:
      # No credentials on the command line: bitcoind writes a .cookie (entrypoint configures rpcauth
      # instead of -rpcpassword), and bitcoin-cli reads it from the datadir. This healthcheck runs
      # every 15s, so passing the password here would keep it permanently visible in host `ps aux`.
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data -rpcwait getblockchaininfo"]
      interval: 15s
      timeout: 10s
      retries: 60
    networks: [fwnet]

  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    container_name: fw-app-main
    restart: unless-stopped
    mem_limit: ${FW_APP_MEM_LIMIT:-1g}
    logging: *logging
    depends_on: [core, knots]
    # All values come from compose/.env (see compose/.env.example); the defaults below reproduce the
    # production deployment so a bare invocation still works — except FW_RPC_PASS, which is required.
    environment:
      - CORE_RPC_URL=${FW_CORE_RPC_URL:-http://core:8332}
      - KNOTS_RPC_URL=${FW_KNOTS_RPC_URL:-http://knots:8332}
      - RPC_USER=${FW_RPC_USER:-forkwars}
      - RPC_PASS=${FW_RPC_PASS:?set FW_RPC_PASS in compose/.env (see compose/.env.example)}
      - POLL_MS=${FW_POLL_MS:-5000}
      - BIND=0.0.0.0:8080
      - NETWORK=${FW_NETWORK:-mainnet}
      # DB filename kept as forkwars.db on purpose: renaming it would orphan the cached history
      # (the node has pruned those blocks — the SQLite cache is the only copy).
      - DB_PATH=${FW_DB_PATH:-/data/forkwars.db}
      - READY_MAX_STALE_SECS=${FW_READY_MAX_STALE_SECS:-60}
      # Ceiling on concurrent WebSocket connections. Over-cap upgrades are refused with 503 and the
      # client falls back to polling (which the edge cache absorbs) — bounding memory under a
      # connection flood instead of accepting unbounded sockets.
      - WS_MAX_CONNS=${FW_WS_MAX_CONNS:-5000}
      - RUST_LOG=${FW_RUST_LOG:-forkwars_backend=info,tower_http=warn,axum::rejection=warn}
      # First epoch (2016-block boundary) where BIP-110/RDTS bit-4 signaling was possible.
      - FLOOR_HEIGHT=${FW_FLOOR_HEIGHT:-927360}
      # Countdown target: start of BIP-110's MANDATORY SIGNALING window (blocks 961,632–963,647).
      # From this height BIP-110 nodes reject blocks that do not signal bit 4 — the point at which
      # the chain can actually split. Later milestones (lock-in 963,648, active 965,664) are not
      # tracked yet; see PLAN.md §10.
      - FORK_AT_HEIGHT=${FW_FORK_AT_HEIGHT:-961632}
      - FORK_LABEL=${FW_FORK_LABEL:-Mandatory signaling}
      # Difficulty geometry. Past the next retarget the ETA reverts to the 600s protocol target
      # rather than extrapolating today's measured rate, which retargeting will erase anyway.
      - TARGET_SPACING_SECS=${FW_TARGET_SPACING_SECS:-600}
      - RETARGET_INTERVAL=${FW_RETARGET_INTERVAL:-2016}
    # The image runs as uid 10001, not root. The app-db volume predates that change and is
    # root-owned, so it must be chowned ONCE before the first start on the new image or the app
    # cannot write the cached history (which the node has pruned and cannot re-supply):
    #   docker run --rm -v forkwars-mainnet_app-db:/data alpine chown -R 10001:10001 /data
    volumes:
      - app-db:/data
    ports:
      - "${FW_APP_PORT:-8081}:8080"   # kept for local debugging; LAN users go through nginx on :80
    networks: [fwnet]

  # LAN reverse proxy: http://forkwatch.local (port 80) -> app:8080 on the internal network.
  nginx:
    image: nginx:alpine
    container_name: fw-nginx-main
    restart: unless-stopped
    mem_limit: ${FW_NGINX_MEM_LIMIT:-256m}
    logging: *logging
    depends_on: [app]
    ports:
      - "80:80"
    volumes:
      - ./nginx/forkwatch.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [fwnet]

  # mDNS publisher: advertises forkwatch.local on the LAN via the host's avahi daemon. Uses host
  # networking + the host D-Bus socket; no sudo needed. Re-detects the host IP on restart.
  mdns:
    build:
      context: ../mdns
    container_name: fw-mdns-main
    restart: unless-stopped
    mem_limit: ${FW_MDNS_MEM_LIMIT:-128m}
    logging: *logging
    network_mode: host
    # Share the host PID namespace so the D-Bus system bus sees matching peer credentials.
    pid: host
    # Ubuntu's default docker AppArmor profile blocks D-Bus (mediation denies the system bus);
    # run this one helper unconfined so it can reach the host's avahi daemon.
    security_opt:
      - apparmor=unconfined
    environment:
      - MDNS_NAME=${FW_MDNS_NAME:-forkwatch.local}
    volumes:
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket

networks:
  fwnet:

# Pinned to the original volume names so existing node data + cached-history DB are reused as-is.
volumes:
  core-data:
    name: forkwars-mainnet_core-data
  knots-data:
    name: forkwars-mainnet_knots-data
  app-db:
    name: forkwars-mainnet_app-db
